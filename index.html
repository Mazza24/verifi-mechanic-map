<style>
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;color:#1F2937}
#app{height:100vh;display:flex;flex-direction:column}
header{background:#12232E;color:#fff;padding:10px 16px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.2px}
header .count{font-size:12px;color:#8FA6B2}
#wrap{flex:1;display:flex;min-height:0}
#sidebar{width:330px;min-width:270px;background:#F7F8F7;border-right:1px solid #E2E5E2;display:flex;flex-direction:column}
#search{margin:10px 10px 6px;padding:8px 10px;border:1px solid #CBD2CB;border-radius:6px;font-size:14px;background:#fff}
#search:focus{outline:2px solid #12232E;outline-offset:-1px}
#nearbar{display:none;margin:0 10px 6px;padding:6px 10px;background:#E8EEF2;border:1px solid #C6D6DF;border-radius:6px;font-size:12px;color:#12455E;align-items:center;justify-content:space-between;gap:8px}
#nearbar button{border:none;background:#12232E;color:#fff;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer}
#layers{padding:0 10px 8px;display:flex;flex-wrap:wrap;gap:6px}
#layers label{display:flex;align-items:center;gap:4px;font-size:12px;background:#fff;border:1px solid #E2E5E2;border-radius:12px;padding:3px 8px;cursor:pointer;user-select:none}
#layers .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
#results{flex:1;overflow-y:auto;border-top:1px solid #E2E5E2}
.res{padding:8px 12px;border-bottom:1px solid #ECEEEC;cursor:pointer;font-size:13px}
.res:hover,.res:focus{background:#E8EEF2;outline:none}
.res .nm{font-weight:600}
.res .sub{color:#6B7280;font-size:12px}
.res.nopin{opacity:.65;cursor:default}
.res .badge{font-size:10px;background:#E2E5E2;border-radius:8px;padding:1px 6px;margin-left:6px;vertical-align:middle}
.res .km{float:right;font-size:11px;color:#12455E;background:#E8EEF2;border-radius:8px;padding:1px 7px;font-variant-numeric:tabular-nums}
.res.place{background:#FDFDF6}
.res.place .nm{color:#12455E}
.sechead{padding:6px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#6B7280;background:#EFF1EF;border-bottom:1px solid #E2E5E2}
#map{flex:1;background:#CFDEE7}
.citylab{font-size:11px;color:#5B6B76;text-shadow:0 0 3px #fff,0 0 3px #fff;white-space:nowrap;font-weight:600}
.searchpin{width:16px;height:16px;border-radius:50%;background:#12232E;border:3px solid #fff;box-shadow:0 0 0 2px #12232E55,0 2px 6px rgba(0,0,0,.4)}
.popup{font-size:13px;line-height:1.45;max-width:280px}
.popup h3{margin:0 0 4px;font-size:14px}
.popup .tag{display:inline-block;font-size:11px;background:#E8EEF2;color:#12455E;border-radius:8px;padding:1px 7px;margin-bottom:5px}
.popup .cmt{color:#4B5563;font-size:12px;margin-top:5px;border-top:1px solid #EEE;padding-top:5px}
.popup a{color:#0F5E8C;text-decoration:none}
@media (max-width:700px){#wrap{flex-direction:column}#sidebar{width:100%;max-height:45%}}
</style>
</head>
<body>

<div id="app">
<header>
  <h1>Verifi Inspect - Mechanic Network</h1>

  </div>
  <div id="map"></div>
</div>
</div>

function refresh(){

    const pre=[],inc=[];
    for(const s of SUBURBS){

    placeSuggestions=pre.concat(inc).slice(0,6);

    layer.pts.forEach(p=>{

    });
