name: Nightly data backup

on:
  schedule:
    - cron: '0 17 * * *'   # 17:00 UTC = 3am AEST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export tables from Supabase
        env:
          SB_URL: ${{ vars.SB_URL }}
          SB_KEY: ${{ vars.SB_KEY }}
        run: python3 backup_export.py
      - name: Commit backup if changed
        run: |
          git config user.name "backup-bot"
          git config user.email "actions@github.com"
          git add backup/
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "Nightly data backup"
          git push
